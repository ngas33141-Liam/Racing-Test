<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Racing Game - Rankings Edition</title>

<style>
body {
    margin: 0;
    background: #1a1a1a;
    overflow-x: hidden;
    text-align: center;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

h2 {
    margin-top: 15px;
    font-size: 28px;
    letter-spacing: 2px;
}

.stats-container {
    background: #333;
    padding: 10px;
    display: inline-block;
    border-radius: 8px;
    margin-bottom: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

#game {
    width: 300px;
    height: 500px;
    background: #444;
    background-image: linear-gradient(90deg, transparent 33%, rgba(255,255,255,0.2) 33%, rgba(255,255,255,0.2) 35%, transparent 35%, transparent 66%, rgba(255,255,255,0.2) 66%, rgba(255,255,255,0.2) 68%, transparent 68%);
    margin: 10px auto;
    position: relative;
    overflow: hidden;
    border: 4px solid #fff;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

.car-design {
    width: 50px;
    height: 90px;
    position: absolute;
    border-radius: 12px;
    transition: left 0.15s ease;
    box-shadow: 0 5px 10px rgba(0,0,0,0.4);
}
.car-design::before {
    content: ''; position: absolute; width: 36px; height: 22px;
    background: rgba(135, 206, 235, 0.85); left: 7px; top: 22px; border-radius: 4px; z-index: 2;
}
.car-design::after {
    content: ''; position: absolute; width: 8px; height: 6px;
    background: #fffb00; left: 6px; top: 2px; border-radius: 2px; box-shadow: 30px 0 0 #fffb00;
}
.wheels {
    position: absolute; width: 6px; height: 14px; background: #111; border-radius: 2px;
    left: -4px; top: 15px; box-shadow: 52px 0 0 #111, 0 50px 0 #111, 52px 50px 0 #111; z-index: 1;
}

.car1 { background: linear-gradient(to bottom, #4facfe, #00f2fe); }
.car2 { background: linear-gradient(to bottom, #ff8c00, #fff700); }
.car3 { background: linear-gradient(to bottom, #e100ff, #7f00ff); }
.enemy { background: linear-gradient(to bottom, #ff4444, #990000); transform: rotate(180deg); }

.has-shield { box-shadow: 0 0 20px #00f2fe, 0 0 40px #00f2fe !important; border: 2px solid #00f2fe; }
.has-boost { box-shadow: 0 0 20px #00ff87, 0 0 40px #00ff87 !important; }

/* Power Up */
.powerup {
    width: 30px; height: 30px; position: absolute; top: -50px; border-radius: 50%;
    display: flex; justify-content: center; align-items: center; font-size: 16px;
    box-shadow: 0 0 10px #fff; animation: pulse 0.5s infinite alternate;
}
@keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.1); } }
.p-shield { background: #00f2fe; border: 2px solid #fff; }
.p-boost { background: #00ff87; border: 2px solid #fff; }

/* Controls */
.controls { margin-top: 10px; }
button.btn-ctrl {
    font-size: 20px; padding: 12px 25px; margin: 5px; border: none; border-radius: 10px;
    cursor: pointer; background-color: #fff; color: #222; font-weight: bold; box-shadow: 0 4px #999;
}
button.btn-ctrl:active { box-shadow: 0 1px #666; transform: translateY(3px); }

/* Container သစ်များ (Shop & Leaderboard တွဲလျက်ပြရန်) */
.flex-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    max-width: 800px;
    margin: 20px auto;
    padding: 0 10px;
}

.shop-container, .leaderboard-container {
    flex: 1;
    min-width: 300px;
    background: #2a2a2a;
    padding: 15px;
    border-radius: 12px;
    border: 2px solid #444;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.shop-item {
    display: flex; justify-content: space-between; align-items: center;
    background: #3a3a3a; margin: 8px 0; padding: 10px; border-radius: 8px;
}
.preview-car { width: 30px; height: 50px; border-radius: 5px; position: relative; display: inline-block; vertical-align: middle; }
.preview-car::before { content: ''; position: absolute; width: 20px; height: 10px; background: rgba(255,255,255,0.5); left: 5px; top: 12px; border-radius: 2px; }
.btn-shop { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; min-width: 80px; }
.owned { background-color: #4CAF50; color: white; }
.equip { background-color: #008CBA; color: white; }
.locked { background-color: #f44336; color: white; }

/* Leaderboard Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    background: #333;
    border-radius: 8px;
    overflow: hidden;
}
th, td {
    padding: 10px;
    text-align: center;
}
th { background-color: #222; color: #60efff; font-weight: bold; }
tr:nth-child(even) { background-color: #3a3a3a; }
.current-player-row {
    background-color: rgba(0, 255, 135, 0.2) !important;
    font-weight: bold;
    color: #00ff87;
}
</style>
</head>

<body>

<h2>🚗 Super Racing Game</h2>
<div class="stats-container">
    Driver: <span id="playerNameDisplay" style="color: #ff8c00; font-weight:bold;">Player</span> |
    Score: <span id="score" style="color: #00ff87; font-weight:bold;">0</span> | 
    🪙 Coins: <span id="coins" style="color: #ffd700; font-weight:bold;">0</span> | 
    Level: <span id="level" style="color: #60efff; font-weight:bold;">1</span>
</div>
<p style="margin: 5px;">
    🏆 High Score: <span id="highScore">0</span> 
    <span id="power-status" style="margin-left:15px; font-weight:bold; color:#00f2fe;"></span>
</p>

<div id="game">
    <div id="player" class="car-design car1" style="bottom: 20px;">
        <div class="wheels"></div>
    </div>
</div>

<div class="controls">
    <button class="btn-ctrl" onclick="moveLeft()">⬅️</button>
    <button class="btn-ctrl" onclick="pauseGame()" id="pauseBtn">⏸ Pause</button>
    <button class="btn-ctrl" onclick="moveRight()">➡️</button>
</div>

<div class="flex-container">
    <div class="shop-container">
        <h3>🛒 Car Shop (ကားဆိုင်)</h3>
        <div class="shop-item">
            <div>
                <div class="preview-car car1"></div>
                <span style="margin-left: 10px;">Classic Blue</span>
            </div>
            <button id="shop-btn-1" class="btn-shop equip" onclick="buyOrEquip(1)">Equipped</button>
        </div>
        <div class="shop-item">
            <div>
                <div class="preview-car car2"></div>
                <span style="margin-left: 10px;">Fire Orange</span>
            </div>
            <span style="color: #ffd700;" id="price-2">🪙 15</span>
            <button id="shop-btn-2" class="btn-shop locked" onclick="buyOrEquip(2)">Buy</button>
        </div>
        <div class="shop-item">
            <div>
                <div class="preview-car car3"></div>
                <span style="margin-left: 10px;">Neon Purple</span>
            </div>
            <span style="color: #ffd700;" id="price-3">🪙 30</span>
            <button id="shop-btn-3" class="btn-shop locked" onclick="buyOrEquip(3)">Buy</button>
        </div>
    </div>

    <div class="leaderboard-container">
        <h3>🏆 Player Rankings (အဆင့်ဇယား)</h3>
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>High Score</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
    </div>
</div>

<script>
const player = document.getElementById("player");
const gameArea = document.getElementById("game");
const powerStatus = document.getElementById("power-status");
const FIREBASE_URL = "https://aikipa-ranking-default-rtdb.firebaseio.com";

let playerName = localStorage.getItem("gamePlayerName");
if (!playerName) {
    playerName = prompt("Enter your Name (လူကြီးမင်းနာမည် ထည့်ပါ):") || "Guest_Player";
    localStorage.setItem("gamePlayerName", playerName);
}
document.getElementById("playerNameDisplay").innerText = playerName;

let score = 0;
let coins = parseInt(localStorage.getItem("gameCoins")) || 0;
let level = 1;
let enemySpeed = 5;
let gamePaused = false;
let gameOver = false;
let highScore = parseInt(localStorage.getItem("highScore")) || 0;

let isShielded = false;
let isBoosted = false;

document.getElementById("highScore").innerText = highScore;
document.getElementById("coins").innerText = coins;

let lanes = [25, 125, 225];
let currentLane = 1;
player.style.left = lanes[currentLane] + "px";

let carOwnership = JSON.parse(localStorage.getItem("carOwnership")) || { 1: true, 2: false, 3: false };
let activeCar = parseInt(localStorage.getItem("activeCar")) || 1;
let carPrices = { 1: 0, 2: 15, 3: 30 };

// Leaderboard Data စနစ် (Multiplayer ပုံစံ Bot များပါဝင်သည်)
let initialRankings = [
    { name: "Aung Aung 🇲🇲", score: 250 },
    { name: "Thinzar ✨", score: 180 },
    { name: "Kaung Kaung 🔥", score: 90 },
    { name: "Sithu_Turbo", score: 40 }
];
let rankings = JSON.parse(localStorage.getItem("gameRankings")) || initialRankings;

function moveLeft(){
    if(!gamePaused && !gameOver && currentLane > 0){
        currentLane--;
        player.style.left = lanes[currentLane] + "px";
    }
}

function moveRight(){
    if(!gamePaused && !gameOver && currentLane < 2){
        currentLane++;
        player.style.left = lanes[currentLane] + "px";
    }
}

function pauseGame(){
    if(gameOver) return;
    gamePaused = !gamePaused;
    document.getElementById("pauseBtn").innerText = gamePaused ? "▶️ Resume" : "⏸ Pause";
}

function buyOrEquip(type) {
    if (carOwnership[type]) {
        activeCar = type;
        localStorage.setItem("activeCar", activeCar);
        updateShopUI();
        updatePlayerCar();
    } else {
        if (coins >= carPrices[type]) {
            coins -= carPrices[type];
            carOwnership[type] = true;
            localStorage.setItem("gameCoins", coins);
            localStorage.setItem("carOwnership", JSON.stringify(carOwnership));
            activeCar = type;
            localStorage.setItem("activeCar", activeCar);
            
            document.getElementById("coins").innerText = coins;
            updateShopUI();
            updatePlayerCar();
            alert("🎉 ကားဝယ်ယူမှု အောင်မြင်ပါသည်။");
        } else {
            alert("❌ Coin မလုံလောက်သေးပါ!");
        }
    }
}

function updatePlayerCar() {
    player.className = "car-design car" + activeCar;
    if(isShielded) player.classList.add("has-shield");
    if(isBoosted) player.classList.add("has-boost");
}

function updateShopUI() {
    for (let i = 1; i <= 3; i++) {
        let btn = document.getElementById("shop-btn-" + i);
        let priceTag = document.getElementById("price-" + i);
        if (carOwnership[i]) {
            if(priceTag) priceTag.style.opacity = '0';
            if (activeCar === i) {
                btn.innerText = "Equipped";
                btn.className = "btn-shop equip";
            } else {
                btn.innerText = "Use";
                btn.className = "btn-shop owned";
            }
        } else {
            btn.innerText = "Buy";
            btn.className = "btn-shop locked";
        }
    }
}

// 🏆 Rankings ဇယားကို Update လုပ်ပေးမည့် Function
function updateLeaderboardUI() {
    // လက်ရှိကစားသမားရဲ့ အမြင့်ဆုံးရမှတ်ကို ထည့်သွင်းတွက်ချက်ရန်
    let allPlayers = [...rankings];
    let found = allPlayers.find(p => p.name === playerName);
    if (found) {
        if (highScore > found.score) found.score = highScore;
    } else {
        allPlayers.push({ name: playerName, score: highScore });
    }

    // Score အများဆုံးကနေ အနည်းဆုံးကို စီရီစဉ်ခြင်း
    allPlayers.sort((a, b) => b.score - a.score);
    
    // Top 5 သာ ဇယားမှာပြမည်
    let top5 = allPlayers.slice(0, 5);
    
    // ဇယားထဲသို့ HTML ထည့်သွင်းခြင်း
    const tbody = document.getElementById("leaderboard-body");
    tbody.innerHTML = "";
    
    top5.forEach((playerData, index) => {
        let row = document.createElement("tr");
        if (playerData.name === playerName) {
            row.className = "current-player-row"; // ကိုယ့်နာမည်ဆိုရင် အရောင်လင်းစေရန်
        }
        
        let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : index + 1;
        
        row.innerHTML = `
            <td>${medal}</td>
            <td>${playerData.name}</td>
            <td>${playerData.score}</td>
        `;
        tbody.appendChild(row);
    });

    // ဒေတာအသစ်ကို သိမ်းဆည်းထားမည်
    localStorage.setItem("gameRankings", JSON.stringify(allPlayers.filter(p => p.name !== playerName)));
}

function createEnemy(){
    if(gamePaused || gameOver) return; 

    const enemy = document.createElement("div");
    enemy.className = "car-design enemy";
    const wheels = document.createElement("div");
    wheels.className = "wheels";
    enemy.appendChild(wheels);

    let lane = Math.floor(Math.random() * 3);
    enemy.style.left = lanes[lane] + "px";
    gameArea.appendChild(enemy);

    let y = -100;

    let move = setInterval(function(){
        if(gameOver) { clearInterval(move); enemy.remove(); return; }
        if(gamePaused) return; 

        y += enemySpeed;
        enemy.style.top = y + "px";

        if(y + 90 > 390 && y < 480 && lane === currentLane){
            if(isShielded) {
                isShielded = false;
                player.classList.remove("has-shield");
                powerStatus.innerText = "";
                enemy.remove();
                clearInterval(move);
                return;
            }
            
            gameOver = true;
            clearInterval(move);
            
            // သေဆုံးချိန်တွင် စံချိန်သစ်တင်နိုင်က ဇယားကို ချက်ချင်း Update လုပ်မည်
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("highScore", highScore);
            }
            localStorage.setItem("gameCoins", coins);
            updateLeaderboardUI();

            setTimeout(() => {
                alert("💥 Game Over! Your Score: " + score);
                location.reload();
            }, 10);
        }

        if(y > 500){ enemy.remove(); clearInterval(move); }
    }, 20);
}

function spawnPowerUp() {
    if(gamePaused || gameOver) return;
    if(Math.random() > 0.4) return;

    const pUp = document.createElement("div");
    let type = Math.random() > 0.5 ? "shield" : "boost";
    
    pUp.className = "powerup " + (type === "shield" ? "p-shield" : "p-boost");
    pUp.innerText = type === "shield" ? "🛡️" : "⚡";
    
    let lane = Math.floor(Math.random() * 3);
    pUp.style.left = (lanes[lane] + 10) + "px";
    gameArea.appendChild(pUp);

    let y = -50;
    let movePUp = setInterval(function() {
        if(gameOver) { clearInterval(movePUp); pUp.remove(); return; }
        if(gamePaused) return;

        y += 6;
        pUp.style.top = y + "px";

        if(y + 30 > 390 && y < 480 && lane === currentLane) {
            clearInterval(movePUp);
            pUp.remove();
            activatePowerUp(type);
        }

        if(y > 500) { clearInterval(movePUp); pUp.remove(); }
    }, 20);
}

function activatePowerUp(type) {
    if(type === "shield") {
        isShielded = true;
        isBoosted = false;
        player.classList.remove("has-boost");
        player.classList.add("has-shield");
        powerStatus.innerText = "🛡️ Shield Active (5s)";
        powerStatus.style.color = "#00f2fe";
        
        setTimeout(() => {
            if(isShielded) {
                isShielded = false;
                player.classList.remove("has-shield");
                powerStatus.innerText = "";
            }
        }, 5000);
    } else {
        isBoosted = true;
        isShielded = false;
        player.classList.remove("has-shield");
        player.classList.add("has-boost");
        powerStatus.innerText = "🚀 Boost Active (3s)";
        powerStatus.style.color = "#00ff87";
        
        setTimeout(() => {
            if(isBoosted) {
                isBoosted = false;
                player.classList.remove("has-boost");
                powerStatus.innerText = "";
            }
        }, 3000);
    }
}

// Score Loop
setInterval(function(){
    if(gamePaused || gameOver) return;

    if(isBoosted) { score += 5; } else { score++; }

    if(score % 10 === 0){
        coins++;
        document.getElementById("coins").innerText = coins;
        localStorage.setItem("gameCoins", coins);
    }

    document.getElementById("score").innerText = score;

    if(score > highScore){
        highScore = score;
        localStorage.setItem("highScore", highScore);
    }
    
    if(score >= 50) { level = 2; enemySpeed = 7; }
    if(score >= 100) { level = 3; enemySpeed = 9; }
    if(score >= 200) { level = 4; enemySpeed = 12; }
    if(score >= 500) { level = 5; enemySpeed = 15; }

    document.getElementById("level").innerText = level;
    document.getElementById("highScore").innerText = highScore;

}, 1000);

window.addEventListener("keydown", function(e) {
    if(e.key === "ArrowLeft" || e.key === "a" || e.key === "A") moveLeft();
    if(e.key === "ArrowRight" || e.key === "d" || e.key === "D") moveRight();
    if(e.key === " ") pauseGame();
});

// စတင်ပွင့်ချိန်တွင် ဇယားကိုဆွဲမည်
updateShopUI();
updatePlayerCar();
updateLeaderboardUI();

setInterval(createEnemy, 1200);
setInterval(spawnPowerUp, 4000);
</script>

</body>
    </html>
