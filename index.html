<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing Game</title>

<style>
body{
    margin:0;
    background:#222;
    overflow:hidden;
    text-align:center;
    color:white;
    font-family:Arial;
}

#game{
    width:300px;
    height:500px;
    background:#555;
    margin:auto;
    position:relative;
    overflow:hidden;
}

#player{
    width:50px;
    height:90px;
    background:cyan;
    position:absolute;
    bottom:20px;
    left:125px;
    border-radius:10px;
}

.enemy{
    width:50px;
    height:90px;
    background:red;
    position:absolute;
    top:-100px;
    border-radius:10px;
}

.controls{
    margin-top:15px;
}

button{
    font-size:30px;
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:15px;
}
</style>
</head>

<body>

<h2>🚗 Racing Game</h2>
    <h2>Score: <span id="score">0</span></h2>
<h2>High Score: <span id="highScore">0</span></h2>

<div id="game">
    <div id="player"></div>
</div>

<div class="controls">
    <button onclick="moveLeft()">⬅️</button>
    <button onclick="moveRight()">➡️</button>
</div>

<script>
const player = document.getElementById("player");
    let score = 0;

let highScore =
localStorage.getItem("highScore") || 0;

document.getElementById("highScore").innerText =
highScore;

let lanes = [25, 125, 225];
let currentLane = 1;

function moveLeft(){
    if(currentLane > 0){
        currentLane--;
        player.style.left = lanes[currentLane] + "px";
    }
}

function moveRight(){
    if(currentLane < 2){
        currentLane++;
        player.style.left = lanes[currentLane] + "px";
    }
}

function createEnemy(){
    const enemy = document.createElement("div");
    enemy.className = "enemy";

    let lane = Math.floor(Math.random()*3);
    enemy.style.left = lanes[lane] + "px";

    document.getElementById("game").appendChild(enemy);

    let y = -100;

    let move = setInterval(function(){

        y += 5;
        enemy.style.top = y + "px";

        if(
            y + 90 > 390 &&
            lane == currentLane
        ){
            clearInterval(move);
            alert("💥 Game Over!");
            location.reload();
        }

        if(y > 500){
            enemy.remove();
            clearInterval(move);
        }

    },20);
}
setInterval(function(){

score++;

document.getElementById("score").innerText = score;

if(score > highScore){

highScore = score;

localStorage.setItem(
"highScore",
highScore
);

document.getElementById("highScore").innerText =
highScore;

}

},1000);
setInterval(createEnemy,1000);

</script>

</body>
</html>
