<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing Game</title>

<style>
body {
    margin: 0;
    background: #222;
    overflow: hidden;
    text-align: center;
    color: white;
    font-family: Arial, sans-serif;
}

#game {
    width: 300px;
    height: 500px;
    background: #555;
    margin: 20px auto;
    position: relative;
    overflow: hidden;
    border: 4px solid #fff;
    border-radius: 10px;
}

#player {
    width: 50px;
    height: 90px;
    position: absolute;
    bottom: 20px;
    left: 125px;
    border-radius: 10px;
    transition: left 0.1s ease;
    border: 2px solid white;
}
.car1 { background: linear-gradient(to bottom, #00f2fe, #4facfe); }
.car2 { background: linear-gradient(to bottom, #fff700, #ff8c00); }
.car3 { background: linear-gradient(to bottom, #00ff87, #60efff); }
.enemy {
    width: 50px;
    height: 90px;
    position: absolute;
    top: -100px;
    border-radius: 10px;
    border: 2px solid white;
    box-shadow: 0 0 10px red;
    background: linear-gradient(to bottom, #ff4444, #990000);
}

.enemy::before {
    content: '';
    position: absolute;
    width: 20px;
    height: 25px;
    background: #87ceeb;
    left: 15px;
    top: 10px;
    border-radius: 5px;
}

.enemy::after {
    content: '';
    position: absolute;
    width: 30px;
    height: 10px;
    background: #333;
    left: 10px;
    bottom: 10px;
    border-radius: 5px;
}
.controls {
    margin-top: 15px;
}

button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: #fff;
    color: #222;
    font-weight: bold;
}

button:hover {
    background-color: #ddd;
}
</style>
</head>

<body>

<h2>🚗 Racing Game</h2>
<p>Score: <span id="score">0</span> | Coins: <span id="coins">0</span> | Level: <span id="level">1</span></p>
<p>High Score: <span id="highScore">0</span></p>

<div id="game">
    <div id="player" class="car1"></div>
</div>

<div class="controls">
    <button onclick="moveLeft()">⬅️</button>
    <button onclick="pauseGame()">⏸ Pause</button>
    <button onclick="moveRight()">➡️</button>
</div>

<h3>Choose Car</h3>
<button onclick="setCar(1)">🚙 Car 1</button>
<button onclick="setCar(2)">🚕 Car 2</button>
<button onclick="setCar(3)">🚗 Car 3</button>

<script>
const player = document.getElementById("player");

let score = 0;
let coins = 0;
let level = 1;
let enemySpeed = 5;
let gamePaused = false;
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

let lanes = [25, 125, 225];
let currentLane = 1;

player.style.left = lanes[currentLane] + "px";

function moveLeft(){
    if(!gamePaused && currentLane > 0){
        currentLane--;
        player.style.left = lanes[currentLane] + "px";
    }
}

function moveRight(){
    if(!gamePaused && currentLane < 2){
        currentLane++;
        player.style.left = lanes[currentLane] + "px";
    }
}

function pauseGame(){
    gamePaused = !gamePaused;
}

function setCar(type){
    player.className = ""; 
    player.classList.add("car" + type);
}

function createEnemy(){
    if(gamePaused) return; 

    const enemy = document.createElement("div");
    enemy.className = "enemy";

    let lane = Math.floor(Math.random()*3);
    enemy.style.left = lanes[lane] + "px";

    document.getElementById("game").appendChild(enemy);

    let y = -100;

    let move = setInterval(function(){
        if(gamePaused) return; 

        y += enemySpeed;
        enemy.style.top = y + "px";

        if(y + 90 > 390 && y < 480 && lane === currentLane){
            clearInterval(move);
            alert("💥 Game Over! Your Score: " + score);
            location.reload();
        }

        if(y > 500){
            enemy.remove();
            clearInterval(move);
        }
    }, 20);
}

setInterval(function(){
    if(gamePaused) return;

    score++;

    if(score % 10 === 0){
        coins++;
        document.getElementById("coins").innerText = coins;
    }

    document.getElementById("score").innerText = score;

    if(score > highScore){
        highScore = score;
        localStorage.setItem("highScore", highScore);
    }
    
    if(score >= 50) { level = 2; enemySpeed = 7; }
    if(score >= 100) { level = 3; enemySpeed = 9; }
    if(score >= 200) { level = 4; enemySpeed = 12; }
    if(score >= 500) { level = 5; enemySpeed = 15; }

    document.getElementById("level").innerText = level;
    document.getElementById("highScore").innerText = highScore;

}, 1000);

setInterval(createEnemy, 1200);
</script>

</body>
</html>
